<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveTrack - Nadajnik, Sędzia i Selektor Mety</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Space+Mono&display=swap" rel="stylesheet">
  
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet" />

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <style>
    body { font-family: 'Space Mono', monospace; background-color: #050505; color: #e0e0e0; }
    .font-chakra { font-family: 'Chakra Petch', sans-serif; }
    .glow-green { text-shadow: 0 0 8px #00ff00; }
    .pulse-bg { animation: pulseGlow 2s infinite; }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 5px #00ff0033; }
      50% { box-shadow: 0 0 20px #00ff0088; }
    }
    #mini-map { width: 100%; height: 220px; border-radius: 6px; border: 1px solid #222; }
  </style>
</head>
<body class="flex flex-col justify-between min-h-screen p-6">

  <header class="text-center pt-4">
    <h1 class="font-chakra font-bold text-xl tracking-widest text-white">
      LIVETRACK <span class="text-[#00ff00] glow-green">REFEREE</span>
    </h1>
    <p class="text-xs text-gray-600 mt-1">MOBILE GAME ENGINE + PICKER</p>
  </header>

  <main id="lobby-screen" class="flex-1 flex flex-col justify-center items-center my-6 w-full max-w-sm mx-auto bg-[#0a0a0a] border border-[#1a1a1a] rounded-lg p-6 space-y-4">
    <h2 class="font-chakra text-sm uppercase tracking-wider text-gray-400">Wybierz swoją tożsamość</h2>
    
    <div class="w-full grid grid-cols-2 gap-2">
      <button onclick="selectPlayer('player1')" class="py-3 border border-[#00ffff] text-[#00ffff] font-chakra uppercase text-[11px] tracking-wider rounded bg-cyan-950/20 active:bg-cyan-950/60 transition-all">
        Gracz 1 (Cyan)
      </button>
      <button onclick="selectPlayer('player2')" class="py-3 border border-[#ff00ff] text-[#ff00ff] font-chakra uppercase text-[11px] tracking-wider rounded bg-magenta-950/20 active:bg-magenta-950/60 transition-all">
        Gracz 2 (Magenta)
      </button>
    </div>

    <div id="p1-setup-zone" class="w-full border-t border-[#111] pt-4 hidden space-y-3">
      <h3 class="font-chakra text-xs uppercase tracking-wider text-center text-yellow-500">Ustawienia wyścigu (Tylko G1)</h3>
      
      <div class="grid grid-cols-2 gap-2">
        <button onclick="setGameMode('score_duel')" id="btn-mode-score" class="py-2 text-[10px] bg-zinc-900 border border-zinc-700 text-white rounded font-chakra uppercase">🍺 Pojedynek</button>
        <button onclick="setGameMode('tron_race')" id="btn-mode-tron" class="py-2 text-[10px] bg-zinc-800 border border-yellow-500 text-yellow-500 rounded font-chakra uppercase">🎮 TRON</button>
      </div>

      <div id="map-picker-container" class="space-y-2">
        <p class="text-[10px] text-gray-500 text-center">Kliknij na mapie, aby ustawić METĘ wyścigu TRON:</p>
        <div id="mini-map"></div>
        <p id="meta-status" class="text-[10px] text-center text-green-400">Meta: Warszawa Centrum (domyślna)</p>
      </div>
    </div>

    <button id="ready-launch-btn" onclick="goToGameScreen()" class="w-full py-3 bg-zinc-800 text-gray-400 font-chakra uppercase text-xs tracking-wider rounded hidden">
      Przejdź do ekranu startowego
    </button>
  </main>

  <main id="game-screen" class="flex-1 flex flex-col justify-center items-center my-8 w-full max-w-sm mx-auto bg-[#0a0a0a] border border-[#1a1a1a] rounded-lg p-6 hidden">
    <div id="status-badge" class="text-xs border border-gray-800 text-gray-500 px-3 py-1 rounded-full mb-6 uppercase tracking-wider">
      Oczekiwanie...
    </div>

    <div class="w-full space-y-3 mb-6 text-sm">
      <div class="flex justify-between border-b border-[#111] pb-1">
        <span class="text-gray-600 text-xs uppercase">Rola</span>
        <span id="ui-role" class="font-chakra font-bold text-white">--</span>
      </div>
      <div class="flex justify-between border-b border-[#111] pb-1">
        <span class="text-gray-600 text-xs uppercase">Tryb gry</span>
        <span id="ui-mode" class="font-chakra text-yellow-500">--</span>
      </div>
      <div class="flex justify-between border-b border-[#111] pb-1">
        <span class="text-gray-600 text-xs uppercase">Twój Wynik</span>
        <span id="ui-score" class="font-chakra text-[#00ff00] text-lg font-bold">0.00</span>
      </div>
      <div class="flex justify-between border-b border-[#111] pb-1">
        <span class="text-gray-600 text-xs uppercase">GPS</span>
        <span id="ui-acc" class="font-chakra text-white">--</span>
      </div>
    </div>

    <button id="action-btn" onclick="toggleTracking()" class="w-full font-chakra font-bold py-4 rounded text-black bg-[#00ff00] hover:bg-[#33ff33] transition-all tracking-wider text-sm uppercase">
      Uruchom nadawanie
    </button>
  </main>

  <footer class="text-center text-[10px] text-gray-700 pb-2">
    Firebase Mobile Referee + MapPicker v2.1
  </footer>

  <script>
    const FIREBASE_DB_URL = "https://biegacz-default-rtdb.europe-west1.firebasedatabase.app/";
    const MAPBOX_TOKEN = "pk.eyJ1Ijoia296YTIiLCJhIjoiY21wY3c4MHBkMDV5cTJycjI2bnZoc3Y5ciJ9._g6b0kK7J3wD7xxcUnPz2A";
    
    let myId = null;
    let opponentId = null;
    let activeMode = "tron_race";
    let isTracking = false;
    let watchId = null;
    let wakeLock = null;
    let miniMap = null;
    let clickMarker = null;

    let lastCoord = null;
    let totalDistanceKm = 0;
    let startTime = null;
    let opponentCoords = [];

    firebase.initializeApp({ databaseURL: FIREBASE_DB_URL });
    const db = firebase.database();

    function haversineMeters(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon/2) * Math.sin(dLon/2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function selectPlayer(id) {
      myId = id;
      opponentId = id === 'player1' ? 'player2' : 'player1';
      document.getElementById("ui-role").innerText = id === 'player1' ? "GRACZ 1" : "GRACZ 2";
      
      document.getElementById("ready-launch-btn").classList.remove("hidden");
      document.getElementById("ready-launch-btn").className = "w-full py-3 bg-[#00ff00] text-black font-chakra font-bold uppercase text-xs tracking-wider rounded transition-all";

      if (myId === "player1") {
        document.getElementById("p1-setup-zone").classList.remove("hidden");
        initMiniMap();
      }

      // Synchronizacja bazy danych na żywo
      db.ref("active_game").on("value", (snapshot) => {
        const game = snapshot.val() || {};
        activeMode = game.mode || "tron_race";
        document.getElementById("ui-mode").innerText = activeMode === "score_duel" ? "🍺 Pojedynek Piwny" : "🎮 Wyścig TRON";
        
        if (game.status === "finished") {
          stopTracking();
          updateStatus("KONIEC! WYGRAŁ: " + (game.winner === "player1" ? "GRACZ 1" : "GRACZ 2"), "border-red-500 text-red-500");
        }
      });

      db.ref(`live/${opponentId}`).on("value", (snapshot) => {
        opponentCoords = [];
        snapshot.forEach((child) => {
          const val = child.val();
          if(val.lat && val.lng) opponentCoords.push(val);
        });
      });
    }

    // Inicjalizacja dotykowej mapy wyboru celu dla Gracza 1
    function initMiniMap() {
      mapboxgl.accessToken = MAPBOX_TOKEN;
      
      // Spróbuj scentrować mini-mapę na obecną pozycję GPS użytkownika, żeby nie szukać Warszawy
      navigator.geolocation.getCurrentPosition((pos) => {
        const { latitude, longitude } = pos.coords;
        buildMap(longitude, latitude);
      }, () => {
        buildMap(21.0122, 52.2297); // fallback na centrum Warszawy
      }, { enableHighAccuracy: true });
    }

    function buildMap(lng, lat) {
      miniMap = new mapboxgl.Map({
        container: 'mini-map',
        style: 'mapbox://styles/mapbox/dark-v11',
        center: [lng, lat],
        zoom: 14,
        attributionControl: false
      });

      clickMarker = new mapboxgl.Marker({ color: "#FFFF00" })
        .setLngLat([lng, lat])
        .addTo(miniMap);

      // KLIKNIĘCIE W MAPĘ USTAWIA NOWY CHECKPOINT
      miniMap.on('click', (e) => {
        const coords = e.lngLat;
        clickMarker.setLngLat(coords);
        
        document.getElementById("meta-status").innerText = `Meta zapisana: ${coords.lat.toFixed(4)}, ${coords.lng.toFixed(4)}`;
        
        // Wyślij nową metę bezpośrednio do Firebase
        db.ref("active_game/checkpoint").set({
          lat: coords.lat,
          lng: coords.lng
        });
      });
    }

    function setGameMode(mode) {
      db.ref("active_game").update({ mode: mode, status: "lobby", winner: null });
      if(mode === 'score_duel') {
        document.getElementById("map-picker-container").style.display = "none";
      } else {
        document.getElementById("map-picker-container").style.display = "block";
        if(miniMap) miniMap.resize();
      }
    }

    function goToGameScreen() {
      document.getElementById("lobby-screen").classList.add("hidden");
      document.getElementById("game-screen").classList.remove("hidden");
    }

    function toggleTracking() {
      if (isTracking) stopTracking(); else startTracking();
    }

    function startTracking() {
      isTracking = true;
      totalDistanceKm = 0;
      lastCoord = null;
      startTime = Date.now();
      
      document.getElementById("action-btn").innerText = "Zatrzymaj grę";
      document.getElementById("action-btn").className = "w-full font-chakra font-bold py-4 rounded text-white bg-red-600 hover:bg-red-700 transition-all tracking-wider text-sm uppercase";
      updateStatus("Transmisja LIVE", "border-[#00ff00] text-[#00ff00] pulse-bg glow-green");

      if (myId === "player1") {
        db.ref("live").remove(); 
        db.ref("active_game").update({ status: "live", winner: null });
      }

      if ('wakeLock' in navigator) {
        navigator.wakeLock.request('screen').then(lock => wakeLock = lock).catch(()=>{});
      }

      watchId = navigator.geolocation.watchPosition(
        (pos) => {
          const { latitude, longitude, accuracy } = pos.coords;
          document.getElementById("ui-acc").innerText = Math.round(accuracy) + " m";

          if (accuracy > 40) return;

          const now = Date.now();
          let currentScore = 0;

          if (lastCoord) {
            const d = haversineMeters(lastCoord.lat, lastCoord.lng, latitude, longitude) / 1000;
            totalDistanceKm += d;
          }
          lastCoord = { lat: latitude, lng: longitude };

          const elapsedMinutes = (now - startTime) / 1000 / 60;
          const avgSpeedKmh = elapsedMinutes > 0 ? (totalDistanceKm / (elapsedMinutes / 60)) : 0;

          if (activeMode === "score_duel") {
            currentScore = (totalDistanceKm * 50) + (avgSpeedKmh * 20) + (elapsedMinutes * 2);
            document.getElementById("ui-score").innerText = currentScore.toFixed(2);
          } else {
            document.getElementById("ui-score").innerText = totalDistanceKm.toFixed(2) + " km";
          }

          // Wyślij aktualny krok do bazy
          db.ref(`live/${myId}`).push({ lat: latitude, lng: longitude, ts: now, score: currentScore });

          // SĘDZIOWANIE NA TELEFONIE
          if (activeMode === "tron_race") {
            db.ref("active_game/checkpoint").once("value", (snap) => {
              const cp = snap.val();
              if (cp) {
                const distToMeta = haversineMeters(latitude, longitude, cp.lat, cp.lng);
                if (distToMeta < 15) {
                  db.ref("active_game").update({ status: "finished", winner: myId });
                }
              }
            });

            for (let i = 0; i < opponentCoords.length; i++) {
              const distToWall = haversineMeters(latitude, longitude, opponentCoords[i].lat, opponentCoords[i].lng);
              if (distToWall < 7) {
                db.ref("active_game").update({ status: "finished", winner: opponentId });
                break;
              }
            }
          }
        },
        (err) => { updateStatus("Błąd GPS: " + err.message, "border-red-900 text-red-500"); },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    function stopTracking() {
      isTracking = false;
      if (watchId) navigator.geolocation.clearWatch(watchId);
      if (wakeLock) wakeLock.release().then(() => wakeLock = null);
      
      document.getElementById("action-btn").innerText = "Uruchom nadawanie";
      document.getElementById("action-btn").className = "w-full font-chakra font-bold py-4 rounded text-black bg-[#00ff00] hover:bg-[#33ff33] transition-all tracking-wider text-sm uppercase";
      updateStatus("Rozłączony", "border-gray-800 text-gray-500");
    }
  </script>
</body>
</html>
