<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveTrack - Mobilny HUD i Sędzia (Fix Flow)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Space+Mono&display=swap" rel="stylesheet">
  
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet" />

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <style>
    body { font-family: 'Space Mono', monospace; background-color: #050505; color: #e0e0e0; }
    .font-chakra { font-family: 'Chakra Petch', sans-serif; }
    .glow-green { text-shadow: 0 0 8px #00ff00; }
    .pulse-bg { animation: pulseGlow 2s infinite; }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 5px #00ff0033; }
      50% { box-shadow: 0 0 20px #00ff0088; }
    }
    /* Stylizacja kontenerów mapy */
    #mini-map { width: 100%; height: 200px; border-radius: 6px; border: 1px solid #222; }
    #live-map { width: 100%; height: 280px; border-radius: 6px; border: 1px solid #333; background: #000; }
  </style>
</head>
<body class="flex flex-col justify-between min-h-screen p-4">

  <header class="text-center pt-2">
    <h1 class="font-chakra font-bold text-lg tracking-widest text-white">
      LIVETRACK <span class="text-[#00ff00] glow-green">HUD</span>
    </h1>
    <p class="text-[9px] text-gray-700 mt-1">MOBILE GAME ENGINE + MAP</p>
  </header>

  <main id="lobby-screen" class="flex-1 flex flex-col justify-center items-center my-4 w-full max-w-sm mx-auto bg-[#0a0a0a] border border-[#1a1a1a] rounded-lg p-5 space-y-4">
    <h2 class="font-chakra text-xs uppercase tracking-wider text-gray-400">Konfiguracja Pojedynku</h2>
    
    <div class="w-full space-y-2">
      <p class="text-[10px] text-gray-600 text-center uppercase">Wybierz swoją rolę:</p>
      <div class="grid grid-cols-2 gap-2">
        <button id="btn-p1" onclick="selectPlayer('player1')" class="py-3 border border-zinc-700 text-gray-500 font-chakra uppercase text-[10px] tracking-wider rounded transition-all">
          Jestem Graczem 1
        </button>
        <button id="btn-p2" onclick="selectPlayer('player2')" class="py-3 border border-zinc-700 text-gray-500 font-chakra uppercase text-[10px] tracking-wider rounded transition-all">
          Jestem Graczem 2
        </button>
      </div>
    </div>

    <div id="p1-setup-zone" class="w-full border-t border-[#111] pt-3 hidden space-y-3">
      <h3 class="font-chakra text-xs uppercase tracking-wider text-center text-yellow-500">Ustawienia gry (Tylko G1)</h3>
      
      <div class="grid grid-cols-2 gap-2">
        <button onclick="setGameMode('score_duel')" id="btn-mode-score" class="py-2 text-[10px] bg-zinc-900 border border-zinc-700 text-white rounded font-chakra uppercase">🍺 Pojedynek</button>
        <button onclick="setGameMode('tron_race')" id="btn-mode-tron" class="py-2 text-[10px] bg-zinc-800 border border-yellow-500 text-yellow-500 rounded font-chakra uppercase pulse-bg">🎮 TRON</button>
      </div>

      <div id="map-picker-container" class="space-y-2">
        <p class="text-[10px] text-gray-500 text-center">Kliknij na mapie, aby ustawić METĘ wyścigu TRON:</p>
        <div id="mini-map"></div>
        <p id="meta-status" class="text-[10px] text-center text-green-400">Meta: Warszawa Centrum (domyślna)</p>
      </div>
    </div>

    <button id="ready-launch-btn" onclick="goToGameScreen()" class="w-full py-4 bg-zinc-800 text-gray-400 font-chakra uppercase font-bold text-xs tracking-wider rounded transition-all hidden">
      Wejdź do gry taktycznej
    </button>
  </main>

  <main id="game-screen" class="flex-1 flex flex-col justify-between my-2 w-full max-w-sm mx-auto bg-[#0a0a0a] border border-[#1a1a1a] rounded-lg p-4 hidden">
    
    <div class="flex justify-between items-center mb-2">
      <div id="status-badge" class="text-[10px] border border-gray-800 text-gray-500 px-3 py-0.5 rounded-full uppercase tracking-wider">
        Oczekiwanie...
      </div>
      <div id="ui-role-active" class="font-chakra font-bold text-xs">--</div>
    </div>

    <div id="live-map" class="mb-3"></div>

    <div class="w-full grid grid-cols-2 gap-2 mb-3 text-xs bg-black/40 p-2 rounded border border-[#111]">
      <div>
        <span class="text-gray-600 text-[10px] uppercase block">Tryb gry</span>
        <span id="ui-mode" class="font-chakra text-yellow-500 font-bold">--</span>
      </div>
      <div>
        <span class="text-gray-600 text-[10px] uppercase block">Twój Wynik</span>
        <span id="ui-score" class="font-chakra text-[#00ff00] font-bold">0.00</span>
      </div>
    </div>

    <button id="action-btn" onclick="toggleTracking()" class="w-full font-chakra font-bold py-3 rounded text-black bg-[#00ff00] hover:bg-[#33ff33] transition-all tracking-wider text-xs uppercase">
      Uruchom nadawanie
    </button>
  </main>

  <footer class="text-center text-[9px] text-gray-700">
    Firebase Mobile Referee + LiveHUD v2.6
  </footer>

  <script>
    const FIREBASE_DB_URL = "https://biegacz-default-rtdb.europe-west1.firebasedatabase.app/";
    const MAPBOX_TOKEN = "pk.eyJ1Ijoia296YTIiLCJhIjoiY21wY3c4MHBkMDV5cTJycjI2bnZoc3Y5ciJ9._g6b0kK7J3wD7xxcUnPz2A";
    
    let myId = null;
    let opponentId = null;
    let activeMode = "tron_race";
    let isTracking = false;
    let watchId = null;
    let wakeLock = null;
    
    let miniMap = null;
    let liveMap = null;
    let clickMarker = null;
    let metaMarkerHUD = null;

    let lastCoord = null;
    let totalDistanceKm = 0;
    let startTime = null;
    let myCoords = [];
    let opponentCoords = [];

    firebase.initializeApp({ databaseURL: FIREBASE_DB_URL });
    const db = firebase.database();

    function haversineMeters(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon/2) * Math.sin(dLon/2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // --- POPRAWKA 1: selectPlayer nie przełącza ekranów, tylko konfiguruje lobby --
    function selectPlayer(id) {
      myId = id;
      opponentId = id === 'player1' ? 'player2' : 'player1';
      
      // Stylowanie przycisków
      const btn1 = document.getElementById("btn-p1");
      const btn2 = document.getElementById("btn-p2");
      btn1.className = id === 'player1' ? "py-3 border border-[#00ffff] text-[#00ffff] font-chakra uppercase text-[10px] rounded bg-cyan-950/20" : "py-3 border border-zinc-700 text-gray-500 font-chakra uppercase text-[10px] rounded";
      btn2.className = id === 'player2' ? "py-3 border border-[#ff00ff] text-[#ff00ff] font-chakra uppercase text-[10px] rounded bg-magenta-950/20" : "py-3 border border-zinc-700 text-gray-500 font-chakra uppercase text-[10px] rounded";

      // Przygotuj tekst na ekranie startowym
      const roleTextActive = id === 'player1' ? "Rola: G1 (Cyan)" : "Rola: G2 (Magenta)";
      document.getElementById("ui-role-active").innerText = roleTextActive;
      document.getElementById("ui-role-active").className = id === 'player1' ? "font-chakra font-bold text-xs text-cyan-400" : "font-chakra font-bold text-xs text-magenta-400";
      
      // Pokaż przycisk wejścia do gry (był ukryty)
      const startBtn = document.getElementById("ready-launch-btn");
      startBtn.classList.remove("hidden");
      startBtn.className = "w-full py-4 bg-[#00ff00] text-black font-chakra font-bold uppercase text-xs tracking-wider rounded transition-all pulse-bg";
      startBtn.innerText = (myId === 'player1') ? "Zatwierdź metę i Wejdź do gry" : "Dołącz do gry";

      if (myId === "player1") {
        document.getElementById("p1-setup-zone").classList.remove("hidden");
        initMiniMap();
      } else {
        // Gracz 2 nie widzi setupu, ale musi kliknąć przycisk "Dołącz"
        document.getElementById("p1-setup-zone").classList.add("hidden");
      }

      // Synchronizacja bazy danych na żywo (bez zmian)
      db.ref("active_game").on("value", (snapshot) => {
        const game = snapshot.val() || {};
        activeMode = game.mode || "tron_race";
        document.getElementById("ui-mode").innerText = activeMode === "score_duel" ? "🍺 Pojedynek" : "🎮 TRON";
        
        if (game.checkpoint && metaMarkerHUD) {
          metaMarkerHUD.setLngLat([game.checkpoint.lng, game.checkpoint.lat]);
        }
        
        if (game.status === "finished") {
          stopTracking();
          updateStatus("KONIEC! WYGRAŁ: " + (game.winner === "player1" ? "GRACZ 1" : "GRACZ 2"), "border-red-500 text-red-500");
        }
      });
      db.ref(`live/${opponentId}`).on("value", (snapshot) => {
        opponentCoords = [];
        const mapCoords = [];
        snapshot.forEach((child) => {
          const val = child.val();
          if(val.lat && val.lng) {
            opponentCoords.push(val);
            mapCoords.push([val.lng, val.lat]);
          }
        });
        updateHUDLayer(opponentId, mapCoords);
      });
      db.ref(`live/${myId}`).on("value", (snapshot) => {
        const mapCoords = [];
        snapshot.forEach((child) => {
          const val = child.val();
          if(val.lat && val.lng) mapCoords.push([val.lng, val.lat]);
        });
        updateHUDLayer(myId, mapCoords);
      });
    }

    // Mini-mapa lobby (bez zmian)
    function initMiniMap() {
      mapboxgl.accessToken = MAPBOX_TOKEN;
      navigator.geolocation.getCurrentPosition((pos) => {
        buildMiniMap(pos.coords.longitude, pos.coords.latitude);
      }, () => { buildMiniMap(21.0122, 52.2297); }, { enableHighAccuracy: true });
    }
    function buildMiniMap(lng, lat) {
      miniMap = new mapboxgl.Map({ container: 'mini-map', style: 'mapbox://styles/mapbox/dark-v11', center: [lng, lat], zoom: 14, attributionControl: false });
      clickMarker = new mapboxgl.Marker({ color: "#FFFF00" }).setLngLat([lng, lat]).addTo(miniMap);
      miniMap.on('click', (e) => { clickMarker.setLngLat(e.lngLat); document.getElementById("meta-status").innerText = `Meta zapisana!`; db.ref("active_game/checkpoint").set({ lat: e.lngLat.lat, lng: e.lngLat.lng }); });
    }

    // --- POPRAWKA 2: initLiveMap TO JEDYNE MIEJSCE INICJALIZACJI MAPY ---
    // Funkcja tworzy obiekt mapy taktycznej na telefonie
    function initLiveMap(startLng, startLat) {
      mapboxgl.accessToken = MAPBOX_TOKEN;
      liveMap = new mapboxgl.Map({
        container: 'live-map', // To ten węzeł, który był pusty!
        style: 'mapbox://styles/mapbox/dark-v11',
        center: [startLng, startLat],
        zoom: 15,
        attributionControl: false
      });

      liveMap.on('load', () => {
        // Linie i ślady dla obu graczy na telefonie
        liveMap.addSource("player1", { type: "geojson", data: { type: "Feature", geometry: { type: "LineString", coordinates: [] } } });
        liveMap.addLayer({ id: "line-p1", type: "line", source: "player1", paint: { "line-color": "#00FFFF", "line-width": 5 } });

        liveMap.addSource("player2", { type: "geojson", data: { type: "Feature", geometry: { type: "LineString", coordinates: [] } } });
        liveMap.addLayer({ id: "line-p2", type: "line", source: "player2", paint: { "line-color": "#FF00FF", "line-width": 5 } });

        // Marker celu (Mety) na HUDzie
        metaMarkerHUD = new mapboxgl.Marker({ color: "#FFFF00" }).setLngLat([startLng, startLat]).addTo(liveMap);
        
        // Pobierz cel z bazy, jeśli już tam jest
        db.ref("active_game/checkpoint").once("value", (snap) => {
          const cp = snap.val();
          if (cp) metaMarkerHUD.setLngLat([cp.lng, cp.lat]);
        });
      });
    }

    // Aktualizacja śladu na mapie telefonu lokalnie
    function updateHUDLayer(id, coords) {
      if (!liveMap || !liveMap.isStyleLoaded()) return;
      const src = liveMap.getSource(id);
      if (src) src.setData({ type: "Feature", geometry: { type: "LineString", coordinates: coords } });
    }

    function setGameMode(mode) {
      db.ref("active_game").update({ mode: mode, status: "lobby", winner: null });
      document.getElementById("map-picker-container").style.display = mode === 'score_duel' ? "none" : "block";
      if(miniMap) miniMap.resize();
    }

    // --- POPRAWKA 3: TO JEST JEDYNE MIEJSCE PRZEŁĄCZAJĄCE EKRANY ---
    // Gracz 1 i Gracz 2 muszą to kliknąć w lobby
    function goToGameScreen() {
      // 1. Zmiana wizualna ekranu na lobby
      document.getElementById("lobby-screen").classList.add("hidden");
      document.getElementById("game-screen").classList.remove("hidden");
      
      // 2. ODPALENIE MAPY TAKTYCZNEJ (ZARAZ PRZESKOCZY NA GPS)
      initLiveMap(21.0122, 52.2297); 
    }

    function toggleTracking() {
      if (isTracking) stopTracking(); else startTracking();
    }

    function startTracking() {
      isTracking = true;
      totalDistanceKm = 0;
      lastCoord = null;
      myCoords = [];
      startTime = Date.now();
      
      document.getElementById("action-btn").innerText = "Zatrzymaj grę";
      document.getElementById("action-btn").className = "w-full font-chakra font-bold py-3 rounded text-white bg-red-600 hover:bg-red-700 transition-all tracking-wider text-xs uppercase";
      updateStatus("Transmisja LIVE", "border-[#00ff00] text-[#00ff00] pulse-bg glow-green");

      if (myId === "player
